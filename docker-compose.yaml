services:
  db:
    image: postgres:16-alpine
    container_name: taskmaster-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskmaster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./taskmaster-backend
      dockerfile: Dockerfile
    container_name: taskmaster-backend
    ports:
      - "8000:8000"
    volumes:
      - ./taskmaster-backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/taskmaster
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./task-app
      dockerfile: Dockerfile
    container_name: taskmaster-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
